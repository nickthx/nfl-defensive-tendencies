name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-import-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies (two-step nfl_data_py --no-deps pattern)
        # nfl_data_py 0.3.3 declares pandas<2.0 but this project pins pandas>=2.1,<2.3.
        # Install everything else first under the strict pandas pin, then install
        # nfl_data_py with --no-deps and its real runtime companions (appdirs, fastparquet).
        # Mirrors scripts/verify_fresh_install.sh.
        run: |
          python -m pip install --upgrade pip
          grep -v '^nfl_data_py' requirements.txt | pip install -r /dev/stdin
          pip install --no-deps nfl_data_py==0.3.3 'appdirs>=1' 'fastparquet>=0.5'

      - name: Lint with ruff
        run: ruff check .

      - name: Import smoke (etl + analysis modules)
        run: |
          python -c "import etl"
          python -c "from analysis import _common, _style"

      - name: SHIP-08 placeholder regex check
        run: |
          ! grep -qE '<[A-Z_]{4,}>' README.md
          ! grep -qE '<[A-Z_]{4,}>' findings/FINDINGS.md
